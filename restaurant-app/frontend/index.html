<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0A0F1A" />
    <!-- Fonts werden lokal via @fontsource in main.tsx geladen (DSGVO-Konform, kein Google CDN) -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96x96.png" />
    <title>ServeFlow — Restaurant Management</title>
    <!-- Dark-Mode sofort anwenden bevor React rendert — verhindert hellen Aufblitz -->
    <script>
      try {
        var stored = localStorage.getItem('restaurant-theme');
        var theme = stored ? JSON.parse(stored).state?.theme : null;
        if (theme === 'dark') document.documentElement.classList.add('dark');
      } catch (e) {}
    </script>
    <!-- model-viewer (Google CDN) bewusst entfernt — DSGVO Drittlandtransfer.
         Wenn 3D-Showcase aktiv: model-viewer per npm bundeln (npm i @google/model-viewer) und im Showcase-Layout dynamisch importieren. -->

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
