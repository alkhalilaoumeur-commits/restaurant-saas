const STORAGE_KEY = 'projekt-dashboard-restaurant-saas';
const DATA_VERSION = 4; // Erhoehen bei jedem groesseren DEFAULT_DATA-Update

function loadData() {
  try {
    // SYNCED_DATA hat IMMER Vorrang — wird bei jedem Sync von sync-dashboard.js geschrieben
    const synced = window.SYNCED_DATA;
    if (synced) {
      // Merge: Synced-Daten als Basis, Default-Daten als Fallback fuer fehlende Felder
      const base = JSON.parse(JSON.stringify(DEFAULT_DATA));
      const merged = { ...base, ...JSON.parse(JSON.stringify(synced)) };
      // Sicherstellen dass neue Felder (roadmap, decisions, dsgvo) vorhanden sind
      if (!merged.roadmap) merged.roadmap = [];
      if (!merged.decisions) merged.decisions = [];
      if (!merged.dsgvo) merged.dsgvo = { entries: [], tomDone: 0, tomOpen: 0, tomPartial: 0, openCritical: [], openImportant: [] };
      return merged;
    }
    return JSON.parse(JSON.stringify(DEFAULT_DATA));
  } catch { return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function Modal({ open, onClose, title, children, wide }) {
  if (!open) return null;
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40" onClick={onClose}>
      <div className={`bg-white dark:bg-card-dark rounded-xl shadow-2xl animate-slide ${wide ? 'w-[700px]' : 'w-[500px]'} max-h-[85vh] overflow-y-auto`} onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between px-6 py-4 border-b dark:border-border-dark">
          <h3 className="text-lg font-semibold text-gray-800 dark:text-gray-100 dark:text-gray-100">{title}</h3>
          <button onClick={onClose} className="p-1 rounded hover:bg-gray-100 dark:hover:bg-slate-700 dark:text-gray-400"><Icon name="x" size={18} /></button>
        </div>
        <div className="px-6 py-4">{children}</div>
      </div>
    </div>
  );
}

function Badge({ text, color }) {

    green: "bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-400",
    red: "bg-red-100 text-red-700 dark:bg-red-900/40 dark:text-red-400",

    blue: "bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-400",
    gray: "bg-gray-100 text-gray-600 dark:bg-gray-800 dark:text-gray-400",
    purple: "bg-purple-100 text-purple-700 dark:bg-purple-900/40 dark:text-purple-400",
    yellow: "bg-yellow-100 text-yellow-700 dark:bg-yellow-900/40 dark:text-yellow-400",
  };
  return <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${colors[color] || colors.gray}`}>{text}</span>;

    primary: "bg-primary text-white hover:bg-primary-hover",
    secondary: "bg-gray-100 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:bg-slate-700 dark:text-gray-300 dark:hover:bg-slate-600",
    danger: "bg-red-50 text-red-600 hover:bg-red-100 dark:bg-red-900/30 dark:text-red-400 dark:hover:bg-red-900/50",
    ghost: "text-gray-500 hover:text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:text-gray-400 dark:hover:text-gray-200 dark:hover:bg-slate-700",
  };
  return <button onClick={onClick} className={`${base} rounded-lg font-medium transition-colors ${styles[variant]} ${className}`}>{children}</button>;
}

function Input({ label, value, onChange, type = "text", placeholder, required }) {
  return (
    <div className="mb-3">
      <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 dark:text-gray-300 mb-1">{label} {required && <span className="text-red-400">*</span>}</label>
      {type === "textarea" ? (
        <textarea value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} rows={3} className="w-full px-3 py-2 border dark:border-border-dark rounded-lg text-sm dark:bg-slate-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary" />
      ) : (
        <input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} className="w-full px-3 py-2 border dark:border-border-dark rounded-lg text-sm dark:bg-slate-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary" />
      )}
    </div>
  );
}

function Select({ label, value, onChange, options, required }) {
  return (
    <div className="mb-3">
      <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 dark:text-gray-300 mb-1">{label} {required && <span className="text-red-400">*</span>}</label>
      <select value={value} onChange={e => onChange(e.target.value)} className="w-full px-3 py-2 border dark:border-border-dark rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary bg-white dark:bg-slate-800 dark:text-gray-200">
        {options.map(o => <option key={o} value={o}>{o}</option>)}
      </select>
    </div>
  );
}

function EmptyState({ icon, text, action, onAction }) {
  return (
    <div className="flex flex-col items-center justify-center py-12 text-gray-400">
      <Icon name={icon} size={40} className="mb-3" />
      <p className="text-sm mb-3">{text}</p>
      {action && <Btn onClick={onAction} small>{action}</Btn>}
    </div>
  );
}

function Confirm({ open, onClose, onConfirm, text }) {
  return (
    <Modal open={open} onClose={onClose} title="Bestaetigung">
      <p className="text-sm text-gray-600 dark:text-gray-400 mb-4">{text}</p>
      <div className="flex justify-end gap-2">
        <Btn variant="secondary" onClick={onClose} small>Abbrechen</Btn>
        <Btn variant="danger" onClick={() => { onConfirm(); onClose(); }} small>Loeschen</Btn>
      </div>
    </Modal>
  );
}

function Tab_Roadmap() {
  const { data } = useApp();
  const roadmap = data.roadmap || [];
  const [expandedPhase, setExpandedPhase] = useState(null);

  // Gesamtfortschritt berechnen
  const totalDone = roadmap.reduce((sum, p) => sum + p.done, 0);
  const totalAll = roadmap.reduce((sum, p) => sum + p.total, 0);
  const totalPct = totalAll > 0 ? Math.round((totalDone / totalAll) * 100) : 0;

  // Phase-Status ableiten
  function phaseStatus(phase) {
    if (phase.total === 0) return { label: "Leer", color: "gray" };
    if (phase.done === phase.total) return { label: "Fertig", color: "green" };
    if (phase.done > 0) return { label: "In Arbeit", color: "orange" };
    return { label: "Geplant", color: "blue" };
  }

  return (
    <div className="animate-fade">
      <div className="flex items-center justify-between mb-6">
        <h2 className="text-lg font-bold text-gray-800 dark:text-gray-100">Roadmap & Todos</h2>
        <span className="text-sm text-gray-500 dark:text-gray-400">{totalDone} / {totalAll} Aufgaben erledigt</span>
      </div>

      {/* Gesamtfortschritt */}
      <div className="bg-white dark:bg-card-dark rounded-xl p-5 shadow-sm border dark:border-border-dark mb-6">
        <div className="flex justify-between items-center mb-2">
          <span className="text-sm font-medium text-gray-700 dark:text-gray-300">Gesamtfortschritt</span>
          <span className="text-sm font-bold text-primary">{totalPct}%</span>
        </div>
        <div className="w-full bg-gray-200 dark:bg-slate-700 rounded-full h-3">
          <div className="bg-primary rounded-full h-3 transition-all" style={{ width: `${totalPct}%` }} />
        </div>
        <p className="text-xs text-gray-500 dark:text-gray-400 mt-1">{totalDone} von {totalAll} Aufgaben erledigt</p>
      </div>

      {/* DSGVO-Zusammenfassung */}
      {data.dsgvo && (
        <div className="bg-white dark:bg-card-dark rounded-xl p-5 shadow-sm border dark:border-border-dark mb-6">
          <h3 className="font-semibold text-gray-800 dark:text-gray-100 mb-3 flex items-center gap-2">
            <Icon name="shield" size={18} className="text-blue-600" />
            DSGVO-Status
          </h3>
          <div className="grid grid-cols-3 gap-4 mb-4">
            <div className="text-center p-3 bg-emerald-50 dark:bg-emerald-900/20 rounded-lg">
              <p className="text-2xl font-bold text-emerald-600">{data.dsgvo.tomDone}</p>
              <p className="text-xs text-emerald-700">Umgesetzt</p>
            </div>
            <div className="text-center p-3 bg-orange-50 dark:bg-orange-900/20 rounded-lg">
              <p className="text-2xl font-bold text-orange-600">{data.dsgvo.tomPartial}</p>
              <p className="text-xs text-orange-700">Teilweise</p>
            </div>
            <div className="text-center p-3 bg-red-50 rounded-lg">
              <p className="text-2xl font-bold text-red-600">{data.dsgvo.tomOpen}</p>
              <p className="text-xs text-red-700">Offen</p>
            </div>
          </div>
          {data.dsgvo.openCritical.length > 0 && (
            <div className="mb-3">
              <p className="text-xs font-semibold text-red-600 mb-1">Kritisch (vor Produktivbetrieb):</p>
              <ul className="space-y-1">
                {data.dsgvo.openCritical.map((item, i) => (
                  <li key={i} className="text-xs text-gray-600 dark:text-gray-400 flex items-start gap-2">
                    <span className="text-red-400 mt-0.5 flex-shrink-0">&#9679;</span>
                    {item}
                  </li>
                ))}
              </ul>
            </div>
          )}
          {data.dsgvo.openImportant.length > 0 && (
            <div>
              <p className="text-xs font-semibold text-orange-600 mb-1">Wichtig (zeitnah):</p>
              <ul className="space-y-1">
                {data.dsgvo.openImportant.map((item, i) => (
                  <li key={i} className="text-xs text-gray-600 dark:text-gray-400 flex items-start gap-2">
                    <span className="text-orange-400 mt-0.5 flex-shrink-0">&#9679;</span>
                    {item}
                  </li>
                ))}
              </ul>
            </div>
          )}
        </div>
      )}

      {/* Phasen-Liste */}
      <div className="space-y-3">
        {roadmap.map((phase, idx) => {
          const status = phaseStatus(phase);
          const pct = phase.total > 0 ? Math.round((phase.done / phase.total) * 100) : 0;
          const isExpanded = expandedPhase === phase.id;

          return (
            <div key={phase.id} className="bg-white dark:bg-card-dark rounded-xl shadow-sm border dark:border-border-dark overflow-hidden">
              {/* Phase Header */}
              <button
                onClick={() => setExpandedPhase(isExpanded ? null : phase.id)}

              >

                  status.color === 'green' ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-400' :
                  status.color === 'orange' ? 'bg-orange-100 text-orange-700 dark:bg-orange-900/40 dark:text-orange-400' :
                  status.color === 'blue' ? 'bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-400' :
                  'bg-gray-100 dark:bg-slate-700 text-gray-500 dark:text-gray-400'
                }`}>
                  {status.color === 'green' ? '✓' : idx + 1}
                </div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 mb-1">
                    <h3 className="font-semibold text-sm text-gray-800 dark:text-gray-100 truncate">{phase.name}</h3>
                    <Badge text={status.label} color={status.color} />
                  </div>
                  {phase.total > 0 && (
                    <div className="flex items-center gap-2">
                      <div className="flex-1 bg-gray-200 dark:bg-slate-700 rounded-full h-1.5">
                        <div className={`rounded-full h-1.5 transition-all ${
                          status.color === 'green' ? 'bg-emerald-500' :
                          status.color === 'orange' ? 'bg-orange-500' :
                          'bg-blue-500'
                        }`} style={{ width: `${pct}%` }} />
                      </div>
                      <span className="text-xs text-gray-500 dark:text-gray-400 flex-shrink-0">{phase.done}/{phase.total}</span>
                    </div>
                  )}
                </div>
                <Icon name="chevron" size={16} className={`text-gray-400 transition-transform ${isExpanded ? 'rotate-90' : ''}`} />
              </button>

              {/* Todo-Liste (aufklappbar) */}
              {isExpanded && phase.todos.length > 0 && (
                <div className="border-t px-5 py-3 bg-gray-50">
                  <div className="space-y-2">
                    {phase.todos.map(todo => (
                      <div key={todo.id} className="flex items-start gap-3 py-1">
                        <div className={`w-4 h-4 rounded border flex items-center justify-center flex-shrink-0 mt-0.5 ${
                          todo.done ? 'bg-emerald-500 border-emerald-500' : 'border-gray-300 dark:border-gray-600 bg-white dark:bg-slate-800'
                        }`}>
                          {todo.done && <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M5 13l4 4L19 7"/></svg>}
                        </div>
                        <span className={`text-sm ${todo.done ? 'text-gray-400 line-through' : 'text-gray-700 dark:text-gray-300'}`}>
                          {todo.title}
                        </span>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {isExpanded && phase.todos.length === 0 && (
                <div className="border-t dark:border-border-dark px-5 py-4 bg-gray-50 dark:bg-slate-800 text-center">
                  <p className="text-xs text-gray-400">Keine Aufgaben in dieser Phase</p>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {roadmap.length === 0 && (
        <EmptyState icon="check" text="Keine Roadmap-Daten vorhanden. Fuehre 'node dashboard/sync-dashboard.js' aus." />
      )}
    </div>
  );
}

function Tab2_DataEditor() {
  const { data, update } = useApp();
  const [selId, setSelId] = useState(data.dataTypes[0]?.id || null);
  const [showFieldModal, setShowFieldModal] = useState(false);
  const [showTypeModal, setShowTypeModal] = useState(false);
  const [showOSModal, setShowOSModal] = useState(false);
  const [editField, setEditField] = useState(null);
  const [editType, setEditType] = useState(null);
  const [editOS, setEditOS] = useState(null);
  const [delConfirm, setDelConfirm] = useState(null);
  const [viewOS, setViewOS] = useState(false);

  const sel = data.dataTypes.find(d => d.id === selId);
  const fieldTypes = ["Text", "Zahl", "Datum", "Ja/Nein", "Liste", "Beziehung", "Option Set"];

  function saveField(f) {
    const dts = [...data.dataTypes];
    const dt = dts.find(d => d.id === selId);
    if (f.id && dt.fields.find(x => x.id === f.id)) {
      dt.fields = dt.fields.map(x => x.id === f.id ? f : x);
    } else {
      dt.fields.push({ ...f, id: generateId() });
    }
    update("dataTypes", dts);
    setShowFieldModal(false); setEditField(null);
  }

  function deleteField(fid) {
    const dts = [...data.dataTypes];
    const dt = dts.find(d => d.id === selId);
    dt.fields = dt.fields.filter(f => f.id !== fid);
    update("dataTypes", dts);
  }

  function saveType(t) {
    let dts = [...data.dataTypes];
    if (t.id && dts.find(x => x.id === t.id)) {
      dts = dts.map(x => x.id === t.id ? { ...x, name: t.name } : x);
    } else {
      dts.push({ id: generateId(), name: t.name, fields: [], relationships: [] });
    }
    update("dataTypes", dts);
    setShowTypeModal(false); setEditType(null);
  }

  function deleteType(tid) {
    update("dataTypes", data.dataTypes.filter(d => d.id !== tid));
    if (selId === tid) setSelId(data.dataTypes[0]?.id || null);
  }

  function saveOS(os) {
    let sets = [...data.optionSets];
    if (os.id && sets.find(x => x.id === os.id)) {
      sets = sets.map(x => x.id === os.id ? os : x);
    } else {
      sets.push({ ...os, id: generateId() });
    }
    update("optionSets", sets);
    setShowOSModal(false); setEditOS(null);
  }

  return (
    <div className="flex gap-6 animate-fade" style={{ minHeight: "calc(100vh - 140px)" }}>
      {/* Left: Data Types List */}
      <div className="w-64 flex-shrink-0">
        <div className="flex items-center justify-between mb-3">
          <h3 className="font-semibold text-gray-800 dark:text-gray-100 text-sm">Data Types</h3>
          <button onClick={() => { setEditType(null); setShowTypeModal(true); }} className="p-1 rounded hover:bg-gray-100 dark:hover:bg-slate-700 dark:text-gray-400"><Icon name="plus" size={16} /></button>
        </div>
        <div className="space-y-1.5">
          {data.dataTypes.map(dt => (
            <div key={dt.id} onClick={() => { setSelId(dt.id); setViewOS(false); }}
              className={`px-3 py-2.5 rounded-lg cursor-pointer flex items-center justify-between group transition-colors ${selId === dt.id && !viewOS ? 'bg-primary text-white' : 'bg-white border hover:border-primary/30'}`}>
              <div className="flex items-center gap-2">
                <Icon name="database" size={14} />
                <span className="text-sm font-medium">{dt.name}</span>
              </div>
              <span className={`text-xs ${selId === dt.id && !viewOS ? 'text-white/70' : 'text-gray-400'}`}>{dt.fields.length} Felder</span>
            </div>
          ))}
        </div>

        <div className="mt-6">
          <div className="flex items-center justify-between mb-3">
            <h3 className="font-semibold text-gray-800 dark:text-gray-100 text-sm">Option Sets</h3>
            <button onClick={() => { setEditOS(null); setShowOSModal(true); }} className="p-1 rounded hover:bg-gray-100 dark:hover:bg-slate-700 dark:text-gray-400"><Icon name="plus" size={16} /></button>

                <div className="flex gap-2">
                  <Btn small variant="secondary" onClick={() => { setEditOS(os); setShowOSModal(true); }}>Bearbeiten</Btn>
                  <Btn small variant="danger" onClick={() => { update("optionSets", data.optionSets.filter(x => x.id !== os.id)); setViewOS(false); }}>Loeschen</Btn>
                </div>
              </div>
              <div className="flex flex-wrap gap-2">
                {os.values.map((v, i) => (
                  <span key={i} className="px-3 py-1.5 bg-blue-50 text-blue-700 rounded-full text-sm font-medium">{v}</span>
                ))}
              </div>
            </div>
          );
        })() : sel ? (
          <div>
            <div className="flex items-center justify-between mb-1">
              <h2 className="text-lg font-bold text-gray-800 dark:text-gray-100">{sel.name}</h2>
              <div className="flex gap-2">
                <Btn small onClick={() => { setEditField(null); setShowFieldModal(true); }}>+ Feld</Btn>
                <Btn small variant="secondary" onClick={() => { setEditType(sel); setShowTypeModal(true); }}>Bearbeiten</Btn>
                <Btn small variant="danger" onClick={() => setDelConfirm(sel.id)}>Loeschen</Btn>

              ))}</p>

            <table className="w-full text-sm">
              <thead>
                <tr className="border-b dark:border-border-dark">
                  <th className="text-left py-2 text-gray-500 dark:text-gray-400 font-medium">Name</th>
                  <th className="text-left py-2 text-gray-500 dark:text-gray-400 font-medium">Typ</th>
                  <th className="text-left py-2 text-gray-500 dark:text-gray-400 font-medium">Beschreibung</th>
                  <th className="text-center py-2 text-gray-500 dark:text-gray-400 font-medium">Pflicht</th>
                  <th className="text-right py-2 text-gray-500 dark:text-gray-400 font-medium">Aktionen</th>
                </tr>
              </thead>
              <tbody>
                {sel.fields.map(f => (
                  <tr key={f.id} className="border-b dark:border-border-dark last:border-0 hover:bg-gray-50 dark:hover:bg-slate-800">

                    <td className="py-2"><Badge text={f.type} color="blue" /></td>
                    <td className="py-2 text-gray-500 text-xs">{f.description}</td>
                    <td className="py-2 text-center">{f.required ? <span className="text-emerald-500">Ja</span> : <span className="text-gray-300">Nein</span>}</td>
                    <td className="py-2 text-right">
                      <button onClick={() => { setEditField(f); setShowFieldModal(true); }} className="p-1 hover:bg-gray-100 dark:hover:bg-slate-700 rounded"><Icon name="edit" size={14} /></button>
                      <button onClick={() => deleteField(f.id)} className="p-1 hover:bg-red-50 rounded text-red-400"><Icon name="trash" size={14} /></button>

      {/* Field Modal */}

      <Confirm open={!!delConfirm} onClose={() => setDelConfirm(null)} onConfirm={() => deleteType(delConfirm)} text="Data Type und alle Felder loeschen?" />

function Tab3_WorkflowEditor() {
  const { data, update } = useApp();
  const [selId, setSelId] = useState(data.workflows[0]?.id || null);
  const [showWFModal, setShowWFModal] = useState(false);
  const [showStepModal, setShowStepModal] = useState(false);
  const [editWF, setEditWF] = useState(null);
  const [editStep, setEditStep] = useState(null);
  const [expandedFolders, setExpandedFolders] = useState({});

  const sel = data.workflows.find(w => w.id === selId);
  const folders = [...new Set(data.workflows.map(w => w.folder))];

  function toggleFolder(f) { setExpandedFolders(p => ({ ...p, [f]: !p[f] })); }

  // Initialize all folders as expanded
  useEffect(() => {
    const init = {};
    folders.forEach(f => { init[f] = true; });
    setExpandedFolders(init);
  }, []);

  function saveWF(wf) {
    let wfs = [...data.workflows];
    if (wf.id && wfs.find(x => x.id === wf.id)) {
      wfs = wfs.map(x => x.id === wf.id ? { ...x, ...wf, steps: x.steps } : x);
    } else {
      wfs.push({ ...wf, id: generateId(), steps: [] });
    }
    update("workflows", wfs);
    setShowWFModal(false); setEditWF(null);
  }

  function deleteWF(wid) {
    update("workflows", data.workflows.filter(w => w.id !== wid));
    if (selId === wid) setSelId(null);
  }

  function saveStep(s) {
    const wfs = [...data.workflows];
    const wf = wfs.find(w => w.id === selId);
    if (s.id && wf.steps.find(x => x.id === s.id)) {
      wf.steps = wf.steps.map(x => x.id === s.id ? s : x);
    } else {
      wf.steps.push({ ...s, id: generateId() });
    }
    update("workflows", wfs);
    setShowStepModal(false); setEditStep(null);
  }

  function deleteStep(sid) {
    const wfs = [...data.workflows];
    const wf = wfs.find(w => w.id === selId);
    wf.steps = wf.steps.filter(s => s.id !== sid);
    update("workflows", wfs);
  }

  function toggleWFStatus(wid) {
    const cycle = ["Geplant", "In Arbeit", "Fertig"];
    const wfs = data.workflows.map(w => {
      if (w.id === wid) { const i = cycle.indexOf(w.status); return { ...w, status: cycle[(i + 1) % 3] }; }
      return w;
    });
    update("workflows", wfs);
  }

  const stepIcons = { condition: "shield", database: "database", navigation: "layout", api: "plug", confirm: "check", popup: "layout" };

  return (
    <div className="flex gap-6 animate-fade" style={{ minHeight: "calc(100vh - 140px)" }}>
      {/* Left: Workflow List */}
      <div className="w-72 flex-shrink-0">
        <div className="flex items-center justify-between mb-3">
          <h3 className="font-semibold text-gray-800 dark:text-gray-100 text-sm">Workflows</h3>
          <button onClick={() => { setEditWF(null); setShowWFModal(true); }} className="p-1 rounded hover:bg-gray-100 dark:hover:bg-slate-700 dark:text-gray-400"><Icon name="plus" size={16} /></button>
        </div>
        <div className="space-y-2">
          {folders.map(folder => (
            <div key={folder}>
              <div onClick={() => toggleFolder(folder)} className="flex items-center gap-2 px-2 py-1.5 cursor-pointer hover:bg-gray-100 dark:hover:bg-slate-700 rounded text-sm font-medium text-gray-600 dark:text-gray-400">
                <Icon name="chevron" size={12} className={`transition-transform ${expandedFolders[folder] ? 'rotate-90' : ''}`} />
                <Icon name="folder" size={14} />
                {folder}
                <span className="text-xs text-gray-400 ml-auto">{data.workflows.filter(w => w.folder === folder).length}</span>
              </div>
              {expandedFolders[folder] && data.workflows.filter(w => w.folder === folder).map(wf => (
                <div key={wf.id} onClick={() => setSelId(wf.id)}
                  className={`ml-5 px-3 py-2 rounded-lg cursor-pointer flex items-center justify-between transition-colors ${selId === wf.id ? 'bg-primary text-white' : 'bg-white border hover:border-primary/30'}`}>
                  <span className="text-sm truncate">{wf.name}</span>
                  <div onClick={e => { e.stopPropagation(); toggleWFStatus(wf.id); }}>{statusBadge(wf.status)}</div>
                </div>
              ))}
            </div>
          ))}
        </div>
      </div>

      {/* Right: Workflow Detail */}
      <div className="flex-1 bg-white dark:bg-card-dark rounded-xl p-6 shadow-sm border dark:border-border-dark">
        {sel ? (
          <div>
            <div className="flex items-center justify-between mb-1">
              <h2 className="text-lg font-bold text-gray-800 dark:text-gray-100">{sel.name}</h2>
              <div className="flex gap-2">
                <Btn small onClick={() => { setEditStep(null); setShowStepModal(true); }}>+ Schritt</Btn>
                <Btn small variant="secondary" onClick={() => { setEditWF(sel); setShowWFModal(true); }}>Bearbeiten</Btn>
                <Btn small variant="danger" onClick={() => deleteWF(sel.id)}>Loeschen</Btn>
              </div>
            </div>
            <div className="flex items-center gap-3 mb-6 text-sm text-gray-500 dark:text-gray-400">
              <Badge text={sel.trigger} color="purple" />
              {statusBadge(sel.status)}
            </div>
            <div className="bg-blue-50 dark:bg-blue-900/20 rounded-lg px-4 py-3 mb-6 text-sm text-blue-800 dark:text-blue-300">
              <strong>Trigger:</strong> {sel.triggerDesc}
            </div>
            <div className="space-y-3">
              {sel.steps.map((s, i) => (
                <div key={s.id} className="flex items-start gap-3 group">
                  <div className="flex flex-col items-center">
                    <div className="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center text-sm font-bold">{i + 1}</div>
                    {i < sel.steps.length - 1 && <div className="w-0.5 h-6 bg-gray-200 dark:bg-slate-700 mt-1" />}
                  </div>
                  <div className="flex-1 bg-gray-50 dark:bg-slate-800 rounded-lg px-4 py-3 border dark:border-border-dark hover:border-primary/30 transition-colors">
                    <div className="flex items-center justify-between">
                      <div className="flex items-center gap-2">
                        <Icon name={stepIcons[s.type] || "workflow"} size={14} className="text-gray-400" />
                        <Badge text={s.type} color={s.type === 'condition' ? 'orange' : s.type === 'database' ? 'blue' : s.type === 'api' ? 'purple' : 'green'} />
                      </div>
                      <div className="opacity-0 group-hover:opacity-100 transition-opacity flex gap-1">
                        <button onClick={() => { setEditStep(s); setShowStepModal(true); }} className="p-1 hover:bg-gray-200 dark:hover:bg-slate-700 rounded"><Icon name="edit" size={12} /></button>
                        <button onClick={() => deleteStep(s.id)} className="p-1 hover:bg-red-100 rounded text-red-400"><Icon name="trash" size={12} /></button>
                      </div>
                    </div>
                    <p className="text-sm text-gray-700 dark:text-gray-300 mt-1">{s.desc}</p>
                  </div>
                </div>
              ))}
            </div>
            {sel.steps.length === 0 && <EmptyState icon="workflow" text="Noch keine Schritte" action="+ Schritt" onAction={() => { setEditStep(null); setShowStepModal(true); }} />}
          </div>
        ) : <EmptyState icon="workflow" text="Waehle einen Workflow" />}
      </div>

      {/* WF Modal */}
      <WFModal open={showWFModal} onClose={() => { setShowWFModal(false); setEditWF(null); }} onSave={saveWF} wf={editWF} folders={folders} />
      <StepModal open={showStepModal} onClose={() => { setShowStepModal(false); setEditStep(null); }} onSave={saveStep} step={editStep} />
    </div>
  );
}

function WFModal({ open, onClose, onSave, wf, folders }) {
  const [name, setName] = useState("");
  const [folder, setFolder] = useState("");
  const [trigger, setTrigger] = useState("Button-Klick");
  const [triggerDesc, setTriggerDesc] = useState("");
  const [status, setStatus] = useState("Geplant");
  useEffect(() => {
    if (wf) { setName(wf.name); setFolder(wf.folder); setTrigger(wf.trigger); setTriggerDesc(wf.triggerDesc); setStatus(wf.status); }
    else { setName(""); setFolder(folders[0] || ""); setTrigger("Button-Klick"); setTriggerDesc(""); setStatus("Geplant"); }
  }, [wf, open]);
  return (
    <Modal open={open} onClose={onClose} title={wf ? "Workflow bearbeiten" : "Neuer Workflow"}>
      <Input label="Name" value={name} onChange={setName} required />
      <Input label="Ordner" value={folder} onChange={setFolder} required placeholder="z.B. Bestellungen" />
      <Select label="Trigger" value={trigger} onChange={setTrigger} options={["Button-Klick", "Seiten-Load", "Backend", "Scheduled"]} />
      <Input label="Trigger-Beschreibung" value={triggerDesc} onChange={setTriggerDesc} placeholder="Wenn: ..." />
      <Select label="Status" value={status} onChange={setStatus} options={["Geplant", "In Arbeit", "Fertig"]} />
      <div className="flex justify-end gap-2">
        <Btn variant="secondary" onClick={onClose} small>Abbrechen</Btn>
        <Btn onClick={() => name && folder && onSave({ id: wf?.id, name, folder, trigger, triggerDesc, status })} small>Speichern</Btn>
      </div>
    </Modal>
  );
}

function StepModal({ open, onClose, onSave, step }) {
  const [type, setType] = useState("database");
  const [desc, setDesc] = useState("");
  useEffect(() => { if (step) { setType(step.type); setDesc(step.desc); } else { setType("database"); setDesc(""); } }, [step, open]);
  return (
    <Modal open={open} onClose={onClose} title={step ? "Schritt bearbeiten" : "Neuer Schritt"}>
      <Select label="Typ" value={type} onChange={setType} options={["condition", "database", "navigation", "api", "confirm", "popup"]} />
      <Input label="Beschreibung" value={desc} onChange={setDesc} type="textarea" required placeholder="Was passiert in diesem Schritt?" />
      <div className="flex justify-end gap-2">
        <Btn variant="secondary" onClick={onClose} small>Abbrechen</Btn>
        <Btn onClick={() => desc && onSave({ id: step?.id, type, desc })} small>Speichern</Btn>
      </div>
    </Modal>
  );
}

function Tab4_SeitenUI() {
  const { data, update } = useApp();
  const [showModal, setShowModal] = useState(false);
  const [editPage, setEditPage] = useState(null);

  function savePage(p) {
    let pages = [...data.pages];
    if (p.id && pages.find(x => x.id === p.id)) {
      pages = pages.map(x => x.id === p.id ? p : x);
    } else {
      pages.push({ ...p, id: generateId() });
    }
    update("pages", pages);
    setShowModal(false); setEditPage(null);
  }

  function deletePage(pid) {
    update("pages", data.pages.filter(p => p.id !== pid));
  }

  function respIcon(ok) {
    return ok ? <span className="text-emerald-500 text-xs font-medium">OK</span> : <span className="text-red-400 text-xs font-medium">Fehlt</span>;
  }

  return (
    <div className="animate-fade">
      <div className="flex items-center justify-between mb-6">
        <h2 className="text-lg font-bold text-gray-800 dark:text-gray-100">Seiten & UI</h2>
        <Btn onClick={() => { setEditPage(null); setShowModal(true); }} small>+ Seite</Btn>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 mb-8">
        {data.pages.map(p => (
          <div key={p.id} className="bg-white dark:bg-card-dark rounded-xl border dark:border-border-dark shadow-sm overflow-hidden hover:shadow-md transition-shadow">
            <div className="h-32 bg-gradient-to-br from-gray-100 to-gray-200 dark:from-slate-700 dark:to-slate-800 flex items-center justify-center text-gray-400">
              <div className="text-center">
                <Icon name="layout" size={32} className="mx-auto mb-1" />
                <span className="text-xs">{p.name}</span>
              </div>
            </div>
            <div className="p-4">
              <div className="flex items-center justify-between mb-1">
                <h3 className="font-semibold text-gray-800 dark:text-gray-100">{p.name}</h3>
                {statusBadge(p.status)}
              </div>
              <p className="text-xs text-gray-500 dark:text-gray-400 mb-3">{p.desc}</p>
              <div className="text-xs text-gray-500 dark:text-gray-400 mb-2">
                <span className="font-medium">Data Types: </span>
                {p.dataTypes.map((d, i) => <span key={i} className="inline-block bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 px-1.5 py-0.5 rounded mr-1 mb-1">{d}</span>)}
              </div>
              {p.reusables.length > 0 && (
                <div className="text-xs text-gray-500 dark:text-gray-400 mb-2">
                  <span className="font-medium">Komponenten: </span>
                  {p.reusables.map((r, i) => <span key={i} className="inline-block bg-purple-50 dark:bg-purple-900/30 text-purple-600 dark:text-purple-400 px-1.5 py-0.5 rounded mr-1 mb-1">{r}</span>)}
                </div>
              )}
              <div className="flex items-center gap-3 text-xs border-t dark:border-border-dark pt-2 mt-2">
                <span className="text-gray-400">Responsive:</span>
                <span>Desktop {respIcon(p.responsive?.desktop)}</span>
                <span>Tablet {respIcon(p.responsive?.tablet)}</span>
                <span>Mobile {respIcon(p.responsive?.mobile)}</span>
              </div>
              <div className="flex gap-1 mt-3">
                <Btn small variant="secondary" onClick={() => { setEditPage(p); setShowModal(true); }}>Bearbeiten</Btn>
                <Btn small variant="danger" onClick={() => deletePage(p.id)}>Loeschen</Btn>
              </div>
            </div>
          </div>
        ))}
      </div>

      <PageModal open={showModal} onClose={() => { setShowModal(false); setEditPage(null); }} onSave={savePage} page={editPage} />
    </div>
  );
}

function PageModal({ open, onClose, onSave, page }) {
  const [name, setName] = useState("");
  const [desc, setDesc] = useState("");
  const [status, setStatus] = useState("Geplant");
  const [dt, setDt] = useState("");
  const [reuse, setReuse] = useState("");
  useEffect(() => {
    if (page) { setName(page.name); setDesc(page.desc); setStatus(page.status); setDt(page.dataTypes.join(", ")); setReuse(page.reusables.join(", ")); }
    else { setName(""); setDesc(""); setStatus("Geplant"); setDt(""); setReuse(""); }
  }, [page, open]);
  return (
    <Modal open={open} onClose={onClose} title={page ? "Seite bearbeiten" : "Neue Seite"}>
      <Input label="Seitenname" value={name} onChange={setName} required />
      <Input label="Beschreibung" value={desc} onChange={setDesc} type="textarea" />
      <Select label="Status" value={status} onChange={setStatus} options={["Geplant", "In Arbeit", "Fertig"]} />
      <Input label="Data Types (Komma-getrennt)" value={dt} onChange={setDt} placeholder="Gericht, Kategorie" />
      <Input label="Reusable Elements (Komma-getrennt)" value={reuse} onChange={setReuse} placeholder="Sidebar, Header" />
      <div className="flex justify-end gap-2">
        <Btn variant="secondary" onClick={onClose} small>Abbrechen</Btn>
        <Btn onClick={() => name && onSave({ id: page?.id, name, desc, status, dataTypes: dt.split(",").map(s => s.trim()).filter(Boolean), reusables: reuse.split(",").map(s => s.trim()).filter(Boolean), responsive: page?.responsive || { desktop: true, tablet: false, mobile: false } })} small>Speichern</Btn>
      </div>
    </Modal>
  );

function Tab6_Privacy() {
  const { data, update } = useApp();
  const dtNames = data.dataTypes.map(d => d.name);
  const ops = ["read", "create", "update", "delete"];
  const opLabels = { read: "Lesen", create: "Erstellen", update: "Aendern", delete: "Loeschen" };

  function togglePerm(roleId, dtName, op) {
    const roles = data.roles.map(r => {
      if (r.id === roleId) {
        const perms = { ...r.perms };
        if (!perms[dtName]) perms[dtName] = { read: false, create: false, update: false, delete: false };
        perms[dtName] = { ...perms[dtName], [op]: !perms[dtName][op] };
        return { ...r, perms };
      }
      return r;
    });
    update("roles", roles);
  }

  return (
    <div className="animate-fade">
      <h2 className="text-lg font-bold text-gray-800 dark:text-gray-100 mb-6">Privacy & Rollen</h2>

      {data.roles.map(role => (
        <div key={role.id} className="bg-white dark:bg-card-dark rounded-xl p-5 border dark:border-border-dark shadow-sm mb-4">
          <h3 className="font-semibold text-gray-800 dark:text-gray-100 mb-3">{role.name}</h3>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr className="border-b dark:border-border-dark">
                  <th className="text-left py-2 text-gray-500 dark:text-gray-400 font-medium w-40">Data Type</th>
                  {ops.map(op => <th key={op} className="text-center py-2 text-gray-500 dark:text-gray-400 font-medium w-24">{opLabels[op]}</th>)}
                </tr>
              </thead>
              <tbody>
                {dtNames.map(dn => (
                  <tr key={dn} className="border-b dark:border-border-dark last:border-0 hover:bg-gray-50 dark:hover:bg-slate-800">
                    <td className="py-2 font-medium text-gray-700 dark:text-gray-300">{dn}</td>
                    {ops.map(op => (
                      <td key={op} className="py-2 text-center">
                        <input type="checkbox" checked={role.perms[dn]?.[op] || false} onChange={() => togglePerm(role.id, dn, op)}
                          className="w-4 h-4 text-primary rounded border-gray-300 focus:ring-primary" />
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      ))}

      <div className="bg-blue-50 dark:bg-blue-900/20 rounded-xl p-5 mt-4">
        <h3 className="font-semibold text-blue-800 dark:text-blue-300 mb-2">Privacy Rules Zusammenfassung</h3>
        <div className="space-y-2 text-sm text-blue-700">
          {dtNames.map(dn => {
            const rules = data.roles.filter(r => r.perms[dn]?.read).map(r => r.name);
            return <p key={dn}><strong>{dn}:</strong> Lesezugriff fuer {rules.join(", ") || "niemand"}</p>;
          })}
        </div>
      </div>
    </div>
  );
}

function Tab7_Issues() {
  const { data, update } = useApp();
  const [showModal, setShowModal] = useState(false);
  const [editIssue, setEditIssue] = useState(null);
  const [dragId, setDragId] = useState(null);

  const columns = ["Backlog", "In Arbeit", "Blockiert", "Erledigt"];

  function saveIssue(issue) {
    let issues = [...data.issues];
    if (issue.id && issues.find(x => x.id === issue.id)) {
      issues = issues.map(x => x.id === issue.id ? issue : x);
    } else {
      issues.push({ ...issue, id: generateId(), created: new Date().toISOString().split('T')[0] });
    }
    update("issues", issues);
    setShowModal(false); setEditIssue(null);
  }

  function deleteIssue(iid) {
    update("issues", data.issues.filter(i => i.id !== iid));
  }

  function moveIssue(issueId, newStatus) {
    const issues = data.issues.map(i => i.id === issueId ? { ...i, status: newStatus } : i);
    update("issues", issues);
  }

  function onDragStart(e, id) { setDragId(id); e.dataTransfer.effectAllowed = "move"; }
  function onDragOver(e) { e.preventDefault(); e.currentTarget.classList.add("drag-over"); }
  function onDragLeave(e) { e.currentTarget.classList.remove("drag-over"); }
  function onDrop(e, col) { e.currentTarget.classList.remove("drag-over"); if (dragId) { moveIssue(dragId, col); setDragId(null); } }

  return (
    <div className="animate-fade">
      <div className="flex items-center justify-between mb-6">
        <h2 className="text-lg font-bold text-gray-800 dark:text-gray-100">Issues & Todos</h2>
        <Btn onClick={() => { setEditIssue(null); setShowModal(true); }} small>+ Issue</Btn>
      </div>

      <div className="grid grid-cols-4 gap-4" style={{ minHeight: "500px" }}>
        {columns.map(col => (
          <div key={col}
            onDragOver={onDragOver} onDragLeave={onDragLeave} onDrop={e => onDrop(e, col)}
            className="bg-gray-50 dark:bg-slate-800 rounded-xl p-3 border-2 border-transparent transition-colors">
            <div className="flex items-center justify-between mb-3">
              <h3 className="font-semibold text-sm text-gray-700 dark:text-gray-300">{col}</h3>
              <span className="text-xs bg-gray-200 dark:bg-slate-700 text-gray-600 dark:text-gray-400 px-2 py-0.5 rounded-full">{data.issues.filter(i => i.status === col).length}</span>
            </div>
            <div className="space-y-2">
              {data.issues.filter(i => i.status === col).map(issue => (
                <div key={issue.id} draggable onDragStart={e => onDragStart(e, issue.id)}
                  className={`bg-white dark:bg-card-dark rounded-lg p-3 border dark:border-border-dark shadow-sm cursor-grab hover:shadow-md transition-shadow ${dragId === issue.id ? 'dragging' : ''}`}>
                  <div className="flex items-start justify-between mb-1">
                    {priorityBadge(issue.priority)}
                    <div className="flex gap-1">
                      <button onClick={() => { setEditIssue(issue); setShowModal(true); }} className="p-0.5 hover:bg-gray-100 dark:hover:bg-slate-700 rounded"><Icon name="edit" size={12} /></button>
                      <button onClick={() => deleteIssue(issue.id)} className="p-0.5 hover:bg-red-50 rounded text-red-400"><Icon name="trash" size={12} /></button>
                    </div>
                  </div>
                  <h4 className="text-sm font-medium text-gray-800 dark:text-gray-100 mb-1">{issue.title}</h4>
                  <p className="text-xs text-gray-500 dark:text-gray-400 mb-2 line-clamp-2">{issue.desc}</p>
                  <div className="flex items-center justify-between">
                    <Badge text={issue.area} color="blue" />
                    <span className="text-xs text-gray-400">{issue.created}</span>
                  </div>
                  <div className="flex gap-1 mt-2">
                    {columns.filter(c => c !== col).map(c => (
                      <button key={c} onClick={() => moveIssue(issue.id, c)} className="text-xs text-gray-400 hover:text-primary hover:underline">{c === "Erledigt" ? "Erledigt" : c === "In Arbeit" ? "Start" : c === "Blockiert" ? "Block" : "Back"}</button>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>

      <IssueModal open={showModal} onClose={() => { setShowModal(false); setEditIssue(null); }} onSave={saveIssue} issue={editIssue} />
    </div>
  );
}

function Tab8_Einstellungen() {
  const { data, update, resetData, syncFromProject, dark, setDark } = useApp();
  const [showReset, setShowReset] = useState(false);
  const [newMember, setNewMember] = useState({ name: "", rolle: "" });

  function exportData() {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `${data.project.name.replace(/\s+/g, '-').toLowerCase()}-export.json`;
    a.click(); URL.revokeObjectURL(url);
  }

  function importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const imported = JSON.parse(ev.target.result);
        if (imported.project && imported.dataTypes) {
          saveData(imported);
          window.location.reload();
        } else {
          alert("Ungueltiges Format");
        }
      } catch { alert("Fehler beim Importieren"); }
    };
    reader.readAsText(file);
  }

  function addMember() {
    if (!newMember.name) return;
    const proj = { ...data.project, team: [...data.project.team, { id: generateId(), ...newMember }] };
    update("project", proj);
    setNewMember({ name: "", rolle: "" });
  }

  function removeMember(mid) {
    const proj = { ...data.project, team: data.project.team.filter(m => m.id !== mid) };
    update("project", proj);
  }

  return (
    <div className="animate-fade max-w-2xl">
      <h2 className="text-lg font-bold mb-6">Einstellungen</h2>

      <div className="rounded-xl p-5 border shadow-sm mb-4" style={{ backgroundColor: 'var(--t-card)', borderColor: 'var(--t-border)' }}>

          </div>
          <button
            onClick={() => setDark(d => !d)}
            className="relative inline-flex h-7 w-12 items-center rounded-full transition-colors duration-200"
            style={{ backgroundColor: dark ? '#3B82F6' : '#d1d5db' }}
          >
            <span
              className="inline-block h-5 w-5 rounded-full bg-white shadow-sm transform transition-transform duration-200"
              style={{ transform: dark ? 'translateX(22px)' : 'translateX(3px)' }}
            />
          </button>
        </div>
      </div>

      <div className="rounded-xl p-5 border shadow-sm mb-4" style={{ backgroundColor: 'var(--t-card)', borderColor: 'var(--t-border)' }}>
        <h3 className="font-semibold mb-3">Projekt</h3>
        <Input label="Projektname" value={data.project.name} onChange={v => update("project", { ...data.project, name: v })} />
        <Input label="Tech Stack" value={data.project.techStack} onChange={v => update("project", { ...data.project, techStack: v })} />
        <Select label="Status" value={data.project.status} onChange={v => update("project", { ...data.project, status: v })} options={["Planung", "In Entwicklung", "Beta", "Live"]} />
      </div>

      <div className="bg-white dark:bg-card-dark rounded-xl p-5 border dark:border-border-dark shadow-sm mb-4">
        <h3 className="font-semibold text-gray-800 dark:text-gray-100 mb-3">Team</h3>
        <div className="space-y-2 mb-3">
          {data.project.team.map(m => (
            <div key={m.id} className="flex items-center justify-between bg-gray-50 dark:bg-slate-800 px-3 py-2 rounded-lg">
              <div>
                <span className="font-medium text-sm text-gray-800 dark:text-gray-100">{m.name}</span>
                <span className="text-xs text-gray-500 dark:text-gray-400 ml-2">{m.rolle}</span>
              </div>
              <button onClick={() => removeMember(m.id)} className="text-red-400 hover:text-red-600"><Icon name="trash" size={14} /></button>
            </div>
          ))}
        </div>
        <div className="flex gap-2">

        <Btn variant="danger" onClick={() => setShowReset(true)} small>Alle Daten zuruecksetzen</Btn>
      </div>

      <Confirm open={showReset} onClose={() => setShowReset(false)} onConfirm={resetData} text="Wirklich ALLE Daten zuruecksetzen? Das kann nicht rueckgaengig gemacht werden!" />
    </div>
  );
}

const TABS = [
  { id: 0, name: "Uebersicht", icon: "home" },
  { id: 1, name: "Roadmap & Todos", icon: "check" },
  { id: 2, name: "Entscheidungen", icon: "folder" },
  { id: 3, name: "Data Editor", icon: "database" },
  { id: 4, name: "Workflows", icon: "workflow" },
  { id: 5, name: "Seiten & UI", icon: "layout" },
  { id: 6, name: "API & Integrationen", icon: "plug" },
  { id: 7, name: "Privacy & Rollen", icon: "shield" },
  { id: 8, name: "Issues (Kanban)", icon: "bug" },
  { id: 9, name: "Einstellungen", icon: "settings" },
];

function App() {
  const [data, setData] = useState(loadData);
  const [activeTab, setActiveTab] = useState(0);
  const [search, setSearch] = useState("");
  const [searchResults, setSearchResults] = useState(null);
  const [dark, setDark] = useState(() => localStorage.getItem('dashboard-dark') === 'true');

  useEffect(() => {
    document.documentElement.classList.toggle('dark', dark);
    localStorage.setItem('dashboard-dark', dark ? 'true' : 'false');
  }, [dark]);

  useEffect(() => { saveData(data); }, [data]);

  function update(key, value) {
    setData(prev => ({ ...prev, [key]: value }));
  }

  function resetData() {
    const fresh = JSON.parse(JSON.stringify(DEFAULT_DATA));
    setData(fresh);
    saveData(fresh);
  }

  function syncFromProject() {
    // Laedt die neuesten synchronisierten Daten aus dashboard-data.js
    // Der User muss vorher "node dashboard/sync-dashboard.js" ausfuehren
    const synced = window.SYNCED_DATA;
    if (synced) {
      setData(JSON.parse(JSON.stringify(synced)));
      saveData(JSON.parse(JSON.stringify(synced)));
      alert('Dashboard wurde mit den neuesten Projektdaten synchronisiert!');
    } else {
      alert('Keine synchronisierten Daten gefunden. Fuehre erst "node dashboard/sync-dashboard.js" aus.');
    }
  }

  // Global Search
  function doSearch(q) {
    setSearch(q);
    if (!q.trim()) { setSearchResults(null); return; }
    const s = q.toLowerCase();
    const results = [];
    // Roadmap/Todos durchsuchen
    (data.roadmap || []).forEach(phase => { if (phase.name.toLowerCase().includes(s)) results.push({ type: "Phase", name: phase.name, tab: 1 }); phase.todos.forEach(t => { if (t.title.toLowerCase().includes(s)) results.push({ type: "Todo", name: t.title, tab: 1 }); }); });
    // Entscheidungen durchsuchen
    (data.decisions || []).forEach(d => { if (d.title.toLowerCase().includes(s) || d.content.toLowerCase().includes(s)) results.push({ type: "Entscheidung", name: d.title, tab: 2 }); });
    data.dataTypes.forEach(dt => { if (dt.name.toLowerCase().includes(s)) results.push({ type: "Data Type", name: dt.name, tab: 3 }); dt.fields.forEach(f => { if (f.name.toLowerCase().includes(s) || f.description.toLowerCase().includes(s)) results.push({ type: "Feld", name: `${dt.name}.${f.name}`, tab: 3 }); }); });
    data.workflows.forEach(wf => { if (wf.name.toLowerCase().includes(s)) results.push({ type: "Workflow", name: wf.name, tab: 4 }); });
    data.pages.forEach(p => { if (p.name.toLowerCase().includes(s)) results.push({ type: "Seite", name: p.name, tab: 5 }); });
    data.integrations.forEach(i => { if (i.name.toLowerCase().includes(s)) results.push({ type: "Integration", name: i.name, tab: 6 }); });
    data.issues.forEach(i => { if (i.title.toLowerCase().includes(s)) results.push({ type: "Issue", name: i.title, tab: 8 }); });
    // DSGVO durchsuchen
    (data.dsgvo?.openCritical || []).forEach(item => { if (item.toLowerCase().includes(s)) results.push({ type: "DSGVO", name: item, tab: 1 }); });
    (data.dsgvo?.openImportant || []).forEach(item => { if (item.toLowerCase().includes(s)) results.push({ type: "DSGVO", name: item, tab: 1 }); });
    setSearchResults(results);
  }

  const tabComponents = [Tab1_Uebersicht, Tab_Roadmap, Tab_Entscheidungen, Tab2_DataEditor, Tab3_WorkflowEditor, Tab4_SeitenUI, Tab5_API, Tab6_Privacy, Tab7_Issues, Tab8_Einstellungen];
  const ActiveComponent = tabComponents[activeTab];

  return (
    <AppContext.Provider value={{ data, setData, update, resetData, syncFromProject, activeTab, setActiveTab, dark, setDark }}>
      <div className="flex h-screen overflow-hidden">
        {/* Sidebar */}
        <div className="w-56 bg-sidebar dark:bg-sidebar-dark flex flex-col flex-shrink-0">
          <div className="px-4 py-5 border-b border-white/10">
            <h1 className="text-white font-bold text-sm">{data.project.name}</h1>
            <p className="text-white/50 text-xs mt-0.5">Projekt-Dashboard</p>
          </div>
          <nav className="flex-1 py-3 overflow-y-auto">
            {TABS.map(tab => (
              <button key={tab.id} onClick={() => { setActiveTab(tab.id); setSearchResults(null); setSearch(""); }}
                className={`w-full flex items-center gap-3 px-4 py-2.5 text-sm transition-colors ${activeTab === tab.id ? 'bg-white/15 text-white font-medium' : 'text-white/60 hover:bg-white/5 hover:text-white/80'}`}>
                <Icon name={tab.icon} size={18} />
                {tab.name}
              </button>
            ))}
          </nav>
          <div className="px-4 py-3 border-t border-white/10">
            <p className="text-white/40 text-xs">v1.0 — Alle Daten lokal</p>
          </div>
        </div>

        {/* Main Content */}
        <div className="flex-1 flex flex-col overflow-hidden">
          {/* Topbar */}
          <div className="bg-white dark:bg-card-dark border-b dark:border-border-dark px-6 py-3 flex items-center gap-4 flex-shrink-0">
            <div className="relative flex-1 max-w-md">
              <Icon name="search" size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 dark:text-gray-500" />
              <input value={search} onChange={e => doSearch(e.target.value)} placeholder="Suche in allen Bereichen..."
                className="w-full pl-9 pr-4 py-2 bg-gray-50 dark:bg-slate-800 border dark:border-border-dark rounded-lg text-sm dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary dark:placeholder-gray-500" />
              {searchResults && (
                <div className="absolute top-full left-0 right-0 mt-1 bg-white dark:bg-card-dark rounded-xl shadow-lg border dark:border-border-dark max-h-64 overflow-y-auto z-50">
                  {searchResults.length === 0 ? (
                    <p className="px-4 py-3 text-sm text-gray-400">Keine Ergebnisse</p>
                  ) : searchResults.map((r, i) => (
                    <button key={i} onClick={() => { setActiveTab(r.tab); setSearchResults(null); setSearch(""); }}
                      className="w-full text-left px-4 py-2.5 hover:bg-gray-50 dark:hover:bg-slate-700 flex items-center gap-2 border-b dark:border-border-dark last:border-0">
                      <Badge text={r.type} color="blue" />
                      <span className="text-sm text-gray-700 dark:text-gray-300 dark:text-gray-300">{r.name}</span>
                    </button>
                  ))}
                </div>
              )}
            </div>
            <div className="text-sm text-gray-500 dark:text-gray-400">{TABS[activeTab].name}</div>
            <button onClick={() => setDark(d => !d)} className="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-slate-700 text-gray-500 dark:text-gray-400 transition-colors" title={dark ? 'Light Mode' : 'Dark Mode'}>
              {dark ? <Icon name="sun" size={18} /> : <Icon name="moon" size={18} />}
            </button>
          </div>

          {/* Content */}
          <div className="flex-1 overflow-y-auto p-6 bg-bg dark:bg-bg-dark">
            <ActiveComponent />
          </div>
        </div>
      </div>
    </AppContext.Provider>
  );
}

// ============================================================
// RENDER
// ============================================================

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
